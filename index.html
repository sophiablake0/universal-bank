<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Universal Bank</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: translateY(-4px); }
    .input { -webkit-appearance: none; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen pb-20">

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white dark:bg-gray-800 rounded-3xl shadow-2xl overflow-hidden">
      <div class="bg-gradient-to-r from-green-600 to-emerald-600 text-white p-8 text-center">
        <h1 class="text-4xl font-bold">Universal Bank</h1>
        <p class="mt-1 opacity-90">Secure Banking</p>
      </div>

      <div class="p-8">
        <div id="signup-form">
          <h2 class="text-2xl font-semibold mb-6 text-center">Create Account</h2>
          <input id="name" type="text" placeholder="Full Name" class="input w-full p-4 mb-4 border border-gray-300 dark:border-gray-600 rounded-2xl focus:outline-none focus:border-green-500">
          <input id="email" type="email" placeholder="Email Address" class="input w-full p-4 mb-4 border border-gray-300 dark:border-gray-600 rounded-2xl focus:outline-none focus:border-green-500">
          <input id="phone" type="tel" placeholder="Phone Number" class="input w-full p-4 mb-4 border border-gray-300 dark:border-gray-600 rounded-2xl focus:outline-none focus:border-green-500">
          <input id="password" type="password" placeholder="Create Password" class="input w-full p-4 mb-6 border border-gray-300 dark:border-gray-600 rounded-2xl focus:outline-none focus:border-green-500">
          <button onclick="signup()" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-semibold text-lg active:scale-95 transition">Sign Up</button>
          <p class="text-center mt-6 text-sm text-gray-500">Already have an account? <span onclick="toggleForms()" class="text-green-600 font-medium cursor-pointer">Log in</span></p>
        </div>

        <div id="login-form" class="hidden">
          <h2 class="text-2xl font-semibold mb-6 text-center">Welcome Back</h2>
          <input id="login-email" type="email" placeholder="Email Address" class="input w-full p-4 mb-4 border border-gray-300 dark:border-gray-600 rounded-2xl focus:outline-none focus:border-green-500">
          <input id="login-password" type="password" placeholder="Password" class="input w-full p-4 mb-6 border border-gray-300 dark:border-gray-600 rounded-2xl focus:outline-none focus:border-green-500">
          <button onclick="login()" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-semibold text-lg active:scale-95 transition">Log In</button>
          <p class="text-center mt-6 text-sm text-gray-500">New here? <span onclick="toggleForms()" class="text-green-600 font-medium cursor-pointer">Create account</span></p>
        </div>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
      <div class="px-6 py-5 flex justify-between items-center">
        <div>
          <h1 class="text-3xl font-bold text-green-600">Universal</h1>
        </div>
        <div class="flex items-center gap-5">
          <button onclick="toggleDarkMode()" class="text-2xl">☀️</button>
          <button onclick="logout()" class="text-red-500 text-sm font-medium">Log out</button>
        </div>
      </div>
    </header>

    <main class="p-6 max-w-xl mx-auto">
      <p class="text-xl mb-8" id="welcome-name">Good morning,</p>

      <!-- College Account -->
      <div class="card bg-white dark:bg-gray-800 rounded-3xl shadow p-6 mb-6">
        <div class="flex justify-between">
          <div>
            <p class="text-sm uppercase tracking-widest text-gray-500">Universal College</p>
            <p class="font-mono text-lg mt-1">••••7169</p>
          </div>
          <div class="text-right">
            <p class="text-4xl font-semibold text-green-600">$70,000.00</p>
            <p class="text-sm text-green-500">Available</p>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4 mt-10">
          <button onclick="fakeAction('Payment successful')" class="py-4 bg-green-600 text-white rounded-2xl font-semibold active:bg-green-700">Pay</button>
          <button onclick="fakeAction('Transfer started')" class="py-4 border-2 border-green-600 text-green-600 rounded-2xl font-semibold active:bg-green-50">Transfer</button>
        </div>
      </div>

      <!-- Savings Account -->
      <div class="card bg-white dark:bg-gray-800 rounded-3xl shadow p-6 mb-6">
        <div class="flex justify-between">
          <div>
            <p class="text-sm uppercase tracking-widest text-gray-500">Universal Savings</p>
            <p class="font-mono text-lg mt-1">••••0393</p>
          </div>
          <div class="text-right">
            <p class="text-4xl font-semibold text-green-600">$5,000,000.00</p>
            <p class="text-sm text-green-500">Available</p>
          </div>
        </div>
        <button onclick="fakeAction('Transfer initiated')" class="mt-10 w-full py-4 border-2 border-green-600 text-green-600 rounded-2xl font-semibold active:bg-green-50">Transfer Funds</button>
      </div>

      <!-- Debt -->
      <div class="bg-white dark:bg-gray-800 rounded-3xl shadow p-6 text-center">
        <p class="text-sm text-gray-500">TOTAL DEBT</p>
        <p class="text-5xl font-bold text-red-500 mt-3">$700.00</p>
      </div>
    </main>
  </div>

  <script>
    function toggleForms() {
      document.getElementById('signup-form').classList.toggle('hidden');
      document.getElementById('login-form').classList.toggle('hidden');
    }

    function signup() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!name || !email || !password) return alert("Please fill all fields");
      
      localStorage.setItem('ub_user', JSON.stringify({name, email, password}));
      alert("✅ Account created successfully!");
      showDashboard(name);
    }

    function login() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const user = JSON.parse(localStorage.getItem('ub_user'));

      if (user && user.email === email && user.password === password) {
        showDashboard(user.name);
      } else {
        alert("Invalid email or password");
      }
    }

    function showDashboard(name) {
      document.getElementById('auth-screen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('welcome-name').innerHTML = `Welcome back, <span class="font-semibold">${name.split(' ')[0]}</span> 👋`;
    }

    function logout() {
      if (confirm("Log out of Universal Bank?")) {
        document.getElementById('dashboard').classList.add('hidden');
        document.getElementById('auth-screen').classList.remove('hidden');
      }
    }

    function fakeAction(msg) {
      const toast = document.createElement('div');
      toast.className = "fixed bottom-6 left-1/2 -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-2xl shadow-lg";
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    }

    function toggleDarkMode() {
      document.documentElement.classList.toggle('dark');
    }

    // Auto-login if account exists
    const saved = localStorage.getItem('ub_user');
    if (saved) {
      const user = JSON.parse(saved);
      showDashboard(user.name);
    }
  </script>
</body>
</html>
