<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Bank - Secure Transfer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style> body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; } </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">

  <div class="max-w-xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-green-500 text-center mb-8">Universal Bank</h1>

    <div class="bg-gray-800 rounded-3xl p-6 mb-6">
      <p class="text-center text-xl mb-4">Welcome, Sophia 👋</p>
      
      <!-- College -->
      <div class="bg-gray-700 rounded-2xl p-5 mb-4">
        <div class="flex justify-between">
          <div>
            <p class="text-sm text-gray-400">UNIVERSAL COLLEGE</p>
            <p class="font-mono">••••7169</p>
          </div>
          <div class="text-right">
            <p class="text-3xl font-bold text-green-400">$70,000.00</p>
          </div>
        </div>
        <button onclick="attemptTransfer()" class="mt-4 w-full bg-green-600 py-3 rounded-xl">Make Transfer</button>
      </div>

      <!-- Savings -->
      <div class="bg-gray-700 rounded-2xl p-5">
        <div class="flex justify-between">
          <div>
            <p class="text-sm text-gray-400">UNIVERSAL SAVINGS</p>
            <p class="font-mono">••••0393</p>
          </div>
          <div class="text-right">
            <p class="text-3xl font-bold text-green-400">$5,000,000.00</p>
          </div>
        </div>
        <button onclick="attemptTransfer()" class="mt-4 w-full border border-green-500 text-green-400 py-3 rounded-xl">Make Transfer</button>
      </div>
    </div>

    <p class="text-center text-red-400 text-sm">Total Debt: <span class="font-bold">$700</span></p>
  </div>

  <!-- Debt Modal -->
  <div id="debt-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
    <div class="bg-gray-800 rounded-3xl p-8 w-full max-w-md">
      <h2 class="text-2xl font-bold text-center mb-4">Debt Block</h2>
      <p class="text-center text-gray-300 mb-6">You must pay your outstanding debt before any transfer can be processed.</p>
      
      <div class="bg-red-900/30 p-6 rounded-2xl mb-6 text-center">
        <p class="text-5xl font-bold text-red-500">$700.00</p>
      </div>

      <button onclick="payDebt()" class="w-full bg-green-600 py-4 rounded-2xl font-semibold text-lg mb-3">Pay Debt Now</button>
      <button onclick="closeModal()" class="w-full text-gray-400 py-3">Cancel</button>
    </div>
  </div>

  <script>
    let debtPaid = false;

    function attemptTransfer() {
      if (!debtPaid) {
        document.getElementById('debt-modal').classList.remove('hidden');
      } else {
        alert("✅ Transfer successful! Funds sent.");
      }
    }

    function payDebt() {
      debtPaid = true;
      document.getElementById('debt-modal').classList.add('hidden');
      alert("✅ Debt cleared! You can now make transfers.");
    }

    function closeModal() {
      document.getElementById('debt-modal').classList.add('hidden');
    }
  </script>
</body>
</html>
